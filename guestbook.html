<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Guestbook</title>
    <style>
        body { font-family: sans-serif; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 1000px; padding: 10px; font-size: 16px; box-sizing: border-box; }
        .status { margin-top: 8px; font-size: 14px; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h2>Guestbook</h2>
    <p>Type your message below. It saves automatically!</p>
    <div id="save-status" class="status">Saved.</div>
    <textarea id="guestbook-input" placeholder="Start writing your thoughts here..."></textarea>
    <script type="module" src="guestbook.js"></script>
    </body>
</html>
